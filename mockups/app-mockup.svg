<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eaf4ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#97a6b5" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="30" y="24" width="1340" height="852" rx="18" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="30" y="24" width="1340" height="78" rx="18" fill="#193549"/>
  <text x="58" y="72" font-family="Segoe UI, Arial" font-size="30" fill="#ffffff" font-weight="700">DailyVideoOps Dashboard</text>
  <text x="1100" y="72" font-family="Segoe UI, Arial" font-size="20" fill="#cde6ff">America/New_York</text>

  <rect x="58" y="128" width="280" height="720" rx="14" fill="#f3f8fc"/>
  <text x="82" y="170" font-family="Segoe UI, Arial" font-size="24" fill="#1a3548" font-weight="700">Today Pipeline</text>
  <g font-family="Segoe UI, Arial" font-size="18" fill="#2c4b5f">
    <text x="82" y="218">1. Pick Topic</text>
    <text x="82" y="256">2. Script Hook/Story/Lesson</text>
    <text x="82" y="294">3. Record Master Video</text>
    <text x="82" y="332">4. Edit + Export</text>
    <text x="82" y="370">5. Caption Variants</text>
    <text x="82" y="408">6. Approval Gate</text>
    <text x="82" y="446">7. Publish + Log Metrics</text>
  </g>

  <rect x="370" y="128" width="970" height="210" rx="14" fill="#f7fbf7"/>
  <text x="396" y="168" font-family="Segoe UI, Arial" font-size="24" fill="#244a31" font-weight="700">Posting Schedule (ET)</text>
  <g font-family="Segoe UI, Arial" font-size="20" fill="#35563f">
    <text x="396" y="214">TikTok: 12:30 PM</text>
    <text x="396" y="248">Instagram: 1:00 PM</text>
    <text x="396" y="282">Facebook: 1:30 PM</text>
    <text x="760" y="214">YouTube Shorts: 2:00 PM</text>
    <text x="760" y="248">WhatsApp Status + Broadcast: 6:00 PM</text>
  </g>

  <rect x="370" y="360" width="470" height="240" rx="14" fill="#fff8ef"/>
  <text x="396" y="400" font-family="Segoe UI, Arial" font-size="24" fill="#66420c" font-weight="700">Content Brief</text>
  <g font-family="Segoe UI, Arial" font-size="18" fill="#7a5214">
    <text x="396" y="438">Topic: How I handled rejection</text>
    <text x="396" y="468">Hook: I learned this the hard way...</text>
    <text x="396" y="498">Lesson: A simple mindset shift...</text>
    <text x="396" y="528">CTA: Comment your biggest lesson</text>
  </g>

  <rect x="870" y="360" width="470" height="240" rx="14" fill="#eff6ff"/>
  <text x="896" y="400" font-family="Segoe UI, Arial" font-size="24" fill="#1f3c66" font-weight="700">Approval + Checklist</text>
  <g font-family="Segoe UI, Arial" font-size="18" fill="#2f4f7a">
    <text x="896" y="438">[x] Hook in first 3 seconds</text>
    <text x="896" y="468">[x] 9:16 / 30-60 sec</text>
    <text x="896" y="498">[ ] Final creator approval</text>
    <text x="896" y="528">[ ] Publish verification complete</text>
  </g>

  <rect x="370" y="620" width="970" height="228" rx="14" fill="#f8f6ff"/>
  <text x="396" y="660" font-family="Segoe UI, Arial" font-size="24" fill="#3b2f66" font-weight="700">Analytics Log (Daily)</text>
  <g font-family="Consolas, monospace" font-size="18" fill="#493f75">
    <text x="396" y="700">date        platform   views retention likes comments shares follows</text>
    <text x="396" y="730">2026-03-09  tiktok     1240  42.0      95    13       21     17</text>
    <text x="396" y="760">2026-03-09  instagram  980   37.5      88    11       19     12</text>
  </g>
</svg>
